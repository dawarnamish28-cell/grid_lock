<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GRIDLOCK — Maintenance</title>

  <style>
    :root {
      --bg: #0e0e0e;
      --panel: #141414;
      --accent: #ff3c3c;
      --text: #e6e6e6;
      --muted: #9a9a9a;
      --line: #2a2a2a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Courier New", monospace;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #1a1a1a 0%, #0e0e0e 60%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 40px 32px;
      max-width: 520px;
      width: 92%;
      text-align: center;
      box-shadow: 0 0 40px rgba(255, 60, 60, 0.08);
    }

    .title {
      font-size: 42px;
      letter-spacing: 3px;
      font-weight: bold;
    }

    .title span {
      color: var(--accent);
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 24px 0;
    }

    .status {
      font-size: 18px;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .status span {
      color: var(--accent);
      font-weight: bold;
    }

    .desc {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .badge {
      display: inline-block;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 14px;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .title {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">GRID<span>LOCK</span></div>

    <div class="divider"></div>

    <div class="badge">TACTICAL SHOOTER</div>

    <div class="status">
      SERVER STATUS: <span>UNDER MAINTENANCE</span>
    </div>

    <p class="desc">
      GRIDLOCK is currently offline while we deploy a new build,
      rebalance combat systems, and improve performance.
      <br><br>
      The battlefield will be live again soon.
    </p>

    <div class="divider"></div>

    <div class="footer">
      © GRIDLOCK • Maintenance Mode
    </div>
  </div>
</body>
</html>
